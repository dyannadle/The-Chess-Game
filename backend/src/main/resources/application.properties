# Database Configuration (PostgreSQL by default)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chess}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
# Explicit driver not needed; Spring Boot will auto-detect from the URL

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

server.port=${PORT:8080}
server.address=0.0.0.0
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.idle-timeout=120000
# Logging
logging.level.org.springframework.web=INFO
logging.level.com.chess=DEBUG
