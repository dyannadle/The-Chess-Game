# Database Configuration (PostgreSQL by default, H2 for local fallback)
spring.datasource.url=${DB_URL:jdbc:h2:mem:chess;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}

server.port=${PORT:8080}
# Logging
logging.level.org.springframework.web=INFO
logging.level.com.chess=DEBUG
