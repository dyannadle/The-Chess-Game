# PURPOSE: Main Spring Boot configuration file — defines database, server, and logging settings.
# IMPACT: Controls HOW the application connects to the database, which port it runs on, and what gets logged.
#         This file is loaded automatically by Spring Boot from the classpath (src/main/resources/).
# ALTERNATIVE: Use application.yml (YAML format) for hierarchical config, or environment variables exclusively.

# ========================= DATABASE CONFIGURATION =========================

# PURPOSE: JDBC connection URL for the PostgreSQL database.
# IMPACT: Tells Hibernate/HikariCP WHERE to connect. The ${DB_URL:...} syntax means:
#         Use the DB_URL environment variable if set, otherwise fall back to jdbc:postgresql://localhost:5432/chess.
#         In production (Render), DB_URL is set to the remote PostgreSQL URL.
#         Locally, it connects to a PostgreSQL instance on localhost.
# ALTERNATIVE: Use application-local.properties with H2 in-memory DB for local development (spring.profiles.active=local).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chess}

# PURPOSE: Database username. Defaults to "postgres" if DB_USER env var is not set.
# IMPACT: Used by HikariCP to authenticate with the PostgreSQL server.
# ALTERNATIVE: Use Spring Vault or AWS Secrets Manager for production credential management.
spring.datasource.username=${DB_USER:postgres}

# PURPOSE: Database password. Defaults to "postgres" if DB_PASSWORD env var is not set.
# IMPACT: Sent in cleartext to the DB server during connection (encrypted in transit if SSL is enabled).
#         WARNING: Default password "postgres" is insecure — change for production.
# ALTERNATIVE: Use encrypted properties (jasypt-spring-boot) or external secret store.
spring.datasource.password=${DB_PASSWORD:postgres}

# PURPOSE: Comment explaining that Spring Boot auto-detects the JDBC driver from the URL.
# IMPACT: Spring sees "postgresql" in the URL and automatically uses org.postgresql.Driver.
# ALTERNATIVE: Explicitly set spring.datasource.driver-class-name=org.postgresql.Driver (unnecessary but explicit).
# Explicit driver not needed; Spring Boot will auto-detect from the URL

# ========================= JPA/HIBERNATE CONFIGURATION =========================

# PURPOSE: Controls Hibernate's DDL (Data Definition Language) auto-generation strategy.
# IMPACT: "update" means Hibernate compares entities to existing tables and adds missing columns/tables.
#         It NEVER drops columns or tables — only additive changes.
#         WARNING: "update" is not safe for production — can cause schema drift. Use Flyway/Liquibase instead.
# ALTERNATIVE: "create-drop" for testing (creates tables, drops on shutdown).
#              "validate" for production (checks schema matches entities, fails if not).
#              "none" with Flyway/Liquibase for managed migrations.
spring.jpa.hibernate.ddl-auto=update

# PURPOSE: Enables SQL statement logging to the console.
# IMPACT: Every JPA query (SELECT, INSERT, UPDATE) is printed to stdout for debugging.
#         Useful during development, but adds noise in production.
# ALTERNATIVE: Set to false in production. Use spring.jpa.properties.hibernate.generate_statistics=true for query stats.
spring.jpa.show-sql=true

# PURPOSE: Formats the SQL output with indentation and line breaks for readability.
# IMPACT: Makes the logged SQL queries easier to read during debugging.
# ALTERNATIVE: Set to false in production to reduce log volume.
spring.jpa.properties.hibernate.format_sql=true

# PURPOSE: Explicitly sets the Hibernate database dialect for SQL generation.
# IMPACT: PostgreSQLDialect tells Hibernate to generate PostgreSQL-compatible SQL (SERIAL, TEXT, etc.).
#         Uses DB_PLATFORM env var with PostgreSQLDialect as the default.
# ALTERNATIVE: Spring Boot auto-detects the dialect from the JDBC URL in most cases.
#              For H2, use org.hibernate.dialect.H2Dialect.
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# ========================= SERVER CONFIGURATION =========================

# PURPOSE: Sets the HTTP port the embedded Tomcat server listens on.
# IMPACT: The backend API is accessible at http://localhost:8080 (or whatever PORT env var is set to).
#         In production (Render), the PORT env var is set by the platform (e.g., 10000).
# ALTERNATIVE: Use server.port=0 for a random available port (useful for testing).
server.port=${PORT:8080}

# PURPOSE: Binds the server to all network interfaces (0.0.0.0).
# IMPACT: Makes the server accessible from external machines (required for Docker and cloud deployments).
#         Without this, the server only listens on localhost (127.0.0.1) — unreachable from outside.
# ALTERNATIVE: server.address=127.0.0.1 — restricts to localhost only (more secure but not deployable).
server.address=0.0.0.0

# ========================= CONNECTION POOL CONFIGURATION (HikariCP) =========================

# PURPOSE: Sets the timeout for initial connection pool creation to 0 (don't fail if DB is unreachable at startup).
# IMPACT: The app starts even if the database is temporarily unavailable. Connections are retried on first use.
#         Useful for cloud deployments where the DB may take time to start.
# ALTERNATIVE: Set to 30000 (30s) to fail fast if the DB is down at startup (fail-safe approach).
spring.datasource.hikari.initialization-fail-timeout=0

# PURPOSE: Maximum time (ms) to wait for a connection from the pool before throwing a timeout exception.
# IMPACT: 5000ms (5 seconds) — if no connection is available within 5s, the request fails with an error.
#         Default is 30000 (30s) which is too long for user-facing requests.
# ALTERNATIVE: Set to 3000ms for even faster failure, or 10000ms for more tolerance on slow networks.
spring.datasource.hikari.connection-timeout=5000

# PURPOSE: Minimum number of idle connections maintained in the connection pool.
# IMPACT: 2 connections are always ready, eliminating cold-start delays when the first request arrives.
#         Without this, the pool starts with 0 connections and creates them on-demand (slow first request).
# ALTERNATIVE: Set to 0 for minimal resource usage (but slower first request after idle).
#              Set equal to maximum-pool-size for constant pool size (no dynamic scaling).
spring.datasource.hikari.minimum-idle=2

# PURPOSE: Maximum number of connections in the pool.
# IMPACT: Limits concurrent database connections to 5. Free-tier databases often limit connections to 5-20.
#         If all 5 are in use, new requests wait up to connection-timeout before failing.
# ALTERNATIVE: Set to 10-20 for production with a dedicated database server.
spring.datasource.hikari.maximum-pool-size=5

# PURPOSE: Interval (ms) at which HikariCP sends keepalive queries to prevent idle connections from being dropped.
# IMPACT: Every 30 seconds, a lightweight query is sent to each idle connection to keep it alive.
#         Prevents free-tier databases (Render, Railway) from dropping idle connections (typical timeout: 60-300s).
#         This was a KEY FIX for the slow login issue — without it, the first request after idle triggered a reconnection.
# ALTERNATIVE: Set to 60000 (1 min) for less frequent keepalives, or 0 to disable (risk of stale connections).
spring.datasource.hikari.keepalive-time=30000

# PURPOSE: Maximum time (ms) a connection can sit idle in the pool before being removed (closed).
# IMPACT: 120000 (2 minutes) — idle connections older than 2 minutes are closed and replaced.
#         Prevents accumulation of stale connections that may have been dropped by the server.
# ALTERNATIVE: Set to 600000 (10 min) for long-lived connections, or 30000 (30s) for aggressive cleanup.
spring.datasource.hikari.idle-timeout=120000

# ========================= LOGGING CONFIGURATION =========================

# PURPOSE: Sets the logging level for Spring Web (MVC, REST) to INFO.
# IMPACT: Logs HTTP request handling, error responses, and Spring Web startup info.
#         INFO hides verbose DEBUG/TRACE messages from Spring's internal processing.
# ALTERNATIVE: Set to DEBUG for troubleshooting request routing issues.
#              Set to WARN in production to reduce log noise.
logging.level.org.springframework.web=INFO

# PURPOSE: Sets the logging level for the com.chess package (our app code) to DEBUG.
# IMPACT: All logger.debug(), logger.info(), logger.warn(), logger.error() calls in com.chess.* are logged.
#         DEBUG level shows detailed information like move data, join events, and query results.
# ALTERNATIVE: Set to INFO in production to reduce log volume (only important events logged).
logging.level.com.chess=DEBUG
