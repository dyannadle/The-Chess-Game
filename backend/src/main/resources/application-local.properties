# PURPOSE: Spring profile-specific configuration for LOCAL development.
# IMPACT: When activated with --spring.profiles.active=local (or SPRING_PROFILES_ACTIVE=local),
#         these settings OVERRIDE the defaults in application.properties.
#         Uses an in-memory H2 database instead of PostgreSQL — no database setup required for local dev.
# ALTERNATIVE: Use Docker Compose to run a local PostgreSQL container that mirrors production.

# ========================= H2 IN-MEMORY DATABASE =========================

# PURPOSE: JDBC URL for the H2 in-memory database.
# IMPACT: "jdbc:h2:mem:chess" creates a transient database named "chess" in JVM memory.
#         DB_CLOSE_DELAY=-1 prevents the database from being destroyed when the last connection closes.
#         Data is LOST when the application stops (ephemeral — perfect for development/testing).
# ALTERNATIVE: jdbc:h2:file:./data/chess — persists H2 data to a file (survives restarts).
#              jdbc:h2:tcp://localhost/~/chess — H2 in server mode (accessible from external tools).
spring.datasource.url=jdbc:h2:mem:chess;DB_CLOSE_DELAY=-1

# PURPOSE: H2 default username. "sa" (system admin) is the H2 convention.
# IMPACT: Used to authenticate with the H2 database engine.
# ALTERNATIVE: Any username works for H2 in-memory mode — it's not security-sensitive.
spring.datasource.username=sa

# PURPOSE: H2 default password — empty string (no password).
# IMPACT: H2 in-memory mode doesn't require authentication.
# ALTERNATIVE: Add a password for consistency with production config.
spring.datasource.password=

# PURPOSE: Explicitly sets the JDBC driver class for H2.
# IMPACT: Overrides auto-detection — ensures H2 driver is used instead of PostgreSQL.
#         Required because both H2 and PostgreSQL drivers are on the classpath (both in pom.xml).
# ALTERNATIVE: Spring Boot can auto-detect from the JDBC URL, but explicit is safer with multiple drivers.
spring.datasource.driver-class-name=org.h2.Driver

# PURPOSE: Sets the Hibernate dialect to H2-compatible SQL.
# IMPACT: Hibernate generates H2-specific SQL (AUTO_INCREMENT, CLOB, etc.) instead of PostgreSQL syntax.
#         Without this, Hibernate would use PostgreSQLDialect (from application.properties) and fail with H2.
# ALTERNATIVE: Spring Boot auto-detects this in most cases, but explicit prevents dialect mismatch errors.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ========================= DEVELOPMENT SETTINGS =========================

# PURPOSE: Enables SQL logging for debugging during local development.
# IMPACT: Same as in application.properties — shows all generated SQL in the console.
spring.jpa.show-sql=true

# PURPOSE: DDL auto mode for development — "update" adds missing columns/tables automatically.
# IMPACT: Schema changes in JPA entities are automatically applied to the H2 database on restart.
#         Since H2 is in-memory, the schema is recreated fresh every startup anyway.
# ALTERNATIVE: "create-drop" — explicitly creates and destroys schema (cleaner for testing).
spring.jpa.hibernate.ddl-auto=update
